name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Resolve workspace references
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          for pkg in agent boxlite cloudflare daytona flyio relay sandbank skills; do
            sed -i "s|\"workspace:\\*\"|\"\^$VERSION\"|g" packages/$pkg/package.json
          done

      # Layer 1: no internal deps
      - name: Publish @sandbank/core
        run: npm publish --provenance --access public || true
        working-directory: packages/core

      - name: Publish @sandbank/relay
        run: npm publish --provenance --access public || true
        working-directory: packages/relay

      # Layer 2: depend on core
      - name: Publish @sandbank/agent
        run: npm publish --provenance --access public || true
        working-directory: packages/agent

      - name: Publish @sandbank/skills
        run: npm publish --provenance --access public || true
        working-directory: packages/skills

      - name: Publish @sandbank/daytona
        run: npm publish --provenance --access public || true
        working-directory: packages/daytona

      - name: Publish @sandbank/flyio
        run: npm publish --provenance --access public || true
        working-directory: packages/flyio

      - name: Publish @sandbank/cloudflare
        run: npm publish --provenance --access public || true
        working-directory: packages/cloudflare

      - name: Publish @sandbank/boxlite
        run: npm publish --provenance --access public || true
        working-directory: packages/boxlite

      # Layer 3: main package
      - name: Publish sandbank
        run: npm publish --provenance --access public || true
        working-directory: packages/sandbank
