name: Sandbank Deploy Preflight

on:
  workflow_call:
    inputs:
      status_context:
        description: GitHub commit-status context written by the Sandbank local runner.
        required: false
        type: string
        default: sandbank/deploy
      wait_seconds:
        description: How long to wait for the local runner marker after a GitHub mirror push.
        required: false
        type: number
        default: 90
      poll_interval_seconds:
        description: Poll interval while waiting for the status marker.
        required: false
        type: number
        default: 5
      sync_actors:
        description: Comma-separated GitHub actors that should never trigger duplicate deploys.
        required: false
        type: string
        default: sandbank-sync
    outputs:
      should_deploy:
        description: "true when GitHub Actions should run deploy jobs."
        value: ${{ jobs.check.outputs.should_deploy }}
      reason:
        description: Why deployment should run or be skipped.
        value: ${{ jobs.check.outputs.reason }}

permissions:
  contents: read
  statuses: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - id: check
        name: Check Sandbank deploy marker
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATUS_CONTEXT: ${{ inputs.status_context }}
          WAIT_SECONDS: ${{ inputs.wait_seconds }}
          POLL_INTERVAL_SECONDS: ${{ inputs.poll_interval_seconds }}
          SYNC_ACTORS: ${{ inputs.sync_actors }}
        run: |
          set -euo pipefail

          output() {
            echo "should_deploy=$1" >> "$GITHUB_OUTPUT"
            echo "reason=$2" >> "$GITHUB_OUTPUT"
            echo "Sandbank preflight: should_deploy=$1 reason=$2"
          }

          if [[ "${GITHUB_EVENT_NAME}" != "push" ]]; then
            output true "not_push_event"
            exit 0
          fi

          IFS=',' read -ra actors <<< "${SYNC_ACTORS}"
          for actor in "${actors[@]}"; do
            actor="$(echo "$actor" | xargs)"
            if [[ -n "$actor" && "${GITHUB_ACTOR}" == "$actor" ]]; then
              output false "sync_actor"
              exit 0
            fi
          done

          deadline=$((SECONDS + WAIT_SECONDS))
          while true; do
            statuses="$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/status")"

            if jq -e --arg context "${STATUS_CONTEXT}" \
              '.statuses[]? | select(.context == $context and .state == "success")' \
              >/dev/null <<< "${statuses}"; then
              output false "already_deployed_by_sandbank"
              exit 0
            fi

            if (( SECONDS >= deadline )); then
              output true "no_sandbank_marker"
              exit 0
            fi

            sleep "${POLL_INTERVAL_SECONDS}"
          done
